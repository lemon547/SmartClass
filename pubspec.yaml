name: smart_class
description: Smart Class — 学生管理、随机点名、积分、考勤、值日、座位表（Android / iOS）
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  lucide_icons_flutter: ^3.1.15
  excel: ^4.0.6
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  open_filex: ^4.7.0
  share_plus: ^10.1.4
  flutter_slidable: ^4.0.3
  archive: ^3.6.1
  record: ^7.1.1
  permission_handler: ^12.0.3
  video_player: ^2.13.0
  audioplayers: ^6.8.1
  image_picker: ^1.2.3
  http: ^1.6.0
  # 本地免费 OCR（Google ML Kit），图片导入先抽文字再给 AI
  google_mlkit_text_recognition: ^0.15.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/mascots/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  # 透明自适应底在多数启动器会变成黑圆；改用暖米色贴合太阳
  adaptive_icon_background: "#FFF8DC"
  adaptive_icon_foreground: assets/icons/app_icon_foreground.png
  adaptive_icon_foreground_inset: 12
  remove_alpha_ios: true
  background_color_ios: "#FFF8DC"
